services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentui}
      POSTGRES_USER: ${POSTGRES_USER:-agentui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentui}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
volumes: { pgdata: {} }
