# ------------------------------------------------------------
# Core application (single source of truth)
# ------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ------------------------------------------------------------
# PostgreSQL datasource
# Priority:
#   1) SPRING_DATASOURCE_*
#   2) POSTGRES_PASSWORD
#   3) POSTGRES_PASS (legacy compatibility)
# ------------------------------------------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentui}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:agentui}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:${POSTGRES_PASS:agentui}}}
spring.datasource.hikari.pool-name=AgentUiHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------
# JPA / Flyway
# Flyway is authoritative for schema changes.
# Hibernate only validates mappings.
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# ------------------------------------------------------------
# Security / app core
# ------------------------------------------------------------
app.env=${APP_ENV:}
app.jwt-secret=${JWT_SECRET:12345678901234567890123456789012}
app.crypto-key=${APP_CRYPTO_KEY:1234567890123456}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ------------------------------------------------------------
# Vicidial integration
# ------------------------------------------------------------
app.vicidial.debug=${APP_VICIDIAL_DEBUG:false}
app.vicidial.dial.default-phone-code=${APP_VICIDIAL_DIAL_DEFAULT_PHONE_CODE:1}
app.vicidial.realtime.service-level-threshold-seconds=${APP_VICIDIAL_REALTIME_SLA_THRESHOLD_SECONDS:20}
vicidial.http.connect-timeout-ms=${VICIDIAL_HTTP_CONNECT_TIMEOUT_MS:4000}
vicidial.http.read-timeout-ms=${VICIDIAL_HTTP_READ_TIMEOUT_MS:12000}
vicidial.http.write-timeout-ms=${VICIDIAL_HTTP_WRITE_TIMEOUT_MS:12000}

# Dynamic Vicidial runtime datasource (resolved from CRM settings)
vicidial.datasource.driver-class-name=${VICIDIAL_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
vicidial.datasource.ttl-ms=${VICIDIAL_DATASOURCE_TTL_MS:60000}
