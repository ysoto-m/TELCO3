# Backend datasource (PostgreSQL)
# Usa las mismas variables que application.yml para evitar credenciales inconsistentes.
# Prioridad:
#   1) SPRING_DATASOURCE_*
#   2) POSTGRES_*
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentui}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:agentui}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:agentui}}

# Flyway debe usar el mismo datasource principal (PostgreSQL)
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# Vicidial dynamic MariaDB datasource (runtime from Admin > Settings)
vicidial.datasource.driver-class-name=org.mariadb.jdbc.Driver
vicidial.datasource.url=${VICIDIAL_DB_URL:}
vicidial.datasource.username=${VICIDIAL_DB_USER:}
vicidial.datasource.password=${VICIDIAL_DB_PASS:}
vicidial.datasource.initialize=false

# Kept only as fallback placeholder; real value should come from Admin settings
VICIDIAL_BASE_URL=${VICIDIAL_BASE_URL:}
