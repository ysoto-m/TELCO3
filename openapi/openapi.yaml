      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentLogoutRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentLogoutResponse' }
  /api/agent/vicidial/call/hangup:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HangupRequest' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/vicidial/leads/import:
    post:
      deprecated: true
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResponse' }
  /api/reports/summary:
    get:
      deprecated: true
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date } }
        - { name: to, in: query, required: true, schema: { type: string, format: date } }
        - { name: campaign, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/reports/export:
    get:
      deprecated: true
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date } }
        - { name: to, in: query, required: true, schema: { type: string, format: date } }
        - { name: format, in: query, required: true, schema: { type: string, enum: [csv] } }
      responses:
        '200':
          description: csv
  /api/admin/summary:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/admin/agents:
