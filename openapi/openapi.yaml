          application/json:
            schema:
              type: object
              required: [campaignId]
              properties:
                campaignId: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/vicidial/dial/manual:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [campaignId, phoneNumber]
              properties:
                campaignId: { type: string }
                phoneNumber: { type: string }
                phoneCode: { type: string }
                dialTimeout: { type: integer }
                dialPrefix: { type: string }
                preview: { type: string, enum: [NO, YES] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/vicidial/poll:
    post:
      deprecated: true
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/manual2/disposiciones:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaignId, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/manual2/subtipificaciones:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaignId, in: query, required: false, schema: { type: string } }
        - { name: tipificacion, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/manual2/contacto:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: phoneNumber, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/manual2/formulario:
