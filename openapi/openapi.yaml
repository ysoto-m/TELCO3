  /api/admin/interactions:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaign, in: query, required: false, schema: { type: string } }
        - { name: agentUser, in: query, required: false, schema: { type: string } }
        - { name: dispo, in: query, required: false, schema: { type: string } }
        - { name: from, in: query, required: true, schema: { type: string, format: date } }
        - { name: to, in: query, required: true, schema: { type: string, format: date } }
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: size, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/admin/interactions/export.csv:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaign, in: query, required: false, schema: { type: string } }
        - { name: agentUser, in: query, required: false, schema: { type: string } }
        - { name: dispo, in: query, required: false, schema: { type: string } }
        - { name: from, in: query, required: true, schema: { type: string, format: date } }
        - { name: to, in: query, required: true, schema: { type: string, format: date } }
      responses:
        '200':
          description: csv
  /api/admin/users:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/admin/users/{id}:
    put:
      deprecated: true
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          content:
            application/json:
