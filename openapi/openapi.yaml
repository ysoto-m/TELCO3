  /api/agent/vicidial/phone/connect:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneConnectRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/agent/vicidial/phone/disconnect:
    post:
