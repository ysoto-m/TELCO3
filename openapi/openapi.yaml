openapi: 3.0.3
info:
  title: VICIdial Agent UI API
  version: 1.1.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        role: { type: string, enum: [AGENT, REPORT_ADMIN] }
        username: { type: string }
    VicidialSettingsRequest:
      type: object
      required: [baseUrl, apiUser, apiPass, source]
      properties:
        baseUrl: { type: string }
        apiUser: { type: string }
        apiPass: { type: string }
        source: { type: string }
    VicidialSettingsResponse:
      type: object
      properties:
        baseUrl: { type: string }
        apiUser: { type: string }
        source: { type: string }
        updatedAt: { type: string, format: date-time }
    AgentProfileResponse:
      type: object
      properties:
        hasAgentPass: { type: boolean }
        lastPhoneLogin: { type: string, nullable: true }
        lastCampaign: { type: string, nullable: true }
        rememberCredentials: { type: boolean }
        connected: { type: boolean }
        connectedPhoneLogin: { type: string, nullable: true }
        connectedCampaign: { type: string, nullable: true }
        agentUser: { type: string }
    AgentPassUpdateRequest:
      type: object
      required: [agentPass]
      properties:
        agentPass: { type: string }
    PhoneConnectRequest:
      type: object
      required: [phoneLogin]
      properties:
        phoneLogin: { type: string }
    CampaignConnectRequest:
      type: object
      required: [campaignId]
      properties:
        campaignId: { type: string }
        mode: { type: string, enum: [predictive, manual], default: predictive }
        rememberCredentials: { type: boolean, default: true }
    VicidialCampaignsResponse:
      type: object
      properties:
        phoneLogin: { type: string }
        campaigns:
          type: array
          items: { type: string }
        raw: { type: string }
    VicidialStatusResponse:
      type: object
      properties:
        agentUser: { type: string }
        phoneConnected: { type: boolean }
        phoneLogin: { type: string, nullable: true }
        campaign: { type: string, nullable: true }
        mode: { type: string, enum: [predictive, manual], nullable: true }
        typingEnabled: { type: boolean }
    ActiveLeadResponse:
      type: object
      properties:
        leadId: { type: integer, nullable: true }
        phoneNumber: { type: string, nullable: true }
        campaign: { type: string, nullable: true }
    AgentContextResponse:
      type: object
      properties:
        lead:
          type: object
          properties:
            leadId: { type: integer }
            phoneNumber: { type: string }
            campaign: { type: string }
            dni: { type: string }
        customer:
          type: object
          properties:
            dni: { type: string }
            firstName: { type: string }
            lastName: { type: string }
        phones:
          type: array
          items:
            type: object
            properties:
              phoneNumber: { type: string }
              isPrimary: { type: boolean }
        interactions:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              dispo: { type: string }
              notes: { type: string }
              createdAt: { type: string, format: date-time }
              syncStatus: { type: string, enum: [PENDING, SYNCED, FAILED] }
        dispoOptions:
          type: array
          items: { type: string }
    InteractionRequest:
      type: object
      required: [mode, leadId, phoneNumber, campaign, dni, dispo]
      properties:
        mode: { type: string, enum: [predictive, manual] }
        leadId: { type: integer }
        phoneNumber: { type: string }
        campaign: { type: string }
        dni: { type: string }
        dispo: { type: string }
        notes: { type: string }
        extra: { type: object, additionalProperties: true }
    InteractionResponse:
      type: object
      properties:
        id: { type: integer }
        syncStatus: { type: string, enum: [PENDING, SYNCED, FAILED] }
        message: { type: string }
    PreviewActionRequest:
      type: object
      required: [leadId, campaign, action]
      properties:
        leadId: { type: integer }
        campaign: { type: string }
        action: { type: string, enum: [DIALONLY, SKIP, FINISH] }
    PauseRequest:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [PAUSE, RESUME] }
    AgentLogoutRequest:
      type: object
      properties:
        reason: { type: string, nullable: true }
    AgentLogoutResponse:
      type: object
      properties:
        ok: { type: boolean }
        hadSession: { type: boolean }
        code: { type: string }
        details: { type: object, additionalProperties: true }
    HangupRequest:
      type: object
      properties:
        campaignId: { type: string, nullable: true }
        dispo: { type: string, nullable: true }
    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
    ImportResponse:
      type: object
      properties:
        imported: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }
    VicidialRealtimeSummaryResponse:
      type: object
      properties:
        connectedAgents: { type: integer }
        availableAgents: { type: integer }
        incallAgents: { type: integer }
        pausedAgents: { type: integer }
        wrapupAgents: { type: integer }
        answeredCalls: { type: integer }
        abandonedCalls: { type: integer }
        serviceLevelPercent: { type: integer }
        averageWaitSeconds: { type: integer }
        averageTalkSeconds: { type: integer }
        generatedAt: { type: string, format: date-time }
    VicidialRealtimeAgentItem:
      type: object
      properties:
        agentUser: { type: string }
        agentName: { type: string }
        extension: { type: string, nullable: true }
        campaignId: { type: string, nullable: true }
        vicidialStatus: { type: string }
        pauseCode: { type: string, nullable: true }
        visibleStatus: { type: string }
        subStatus: { type: string }
        currentPhone: { type: string, nullable: true }
        connectedTo: { type: string, nullable: true }
        stateSeconds: { type: integer }
        lastCallTime: { type: string, format: date-time, nullable: true }
        completedToday: { type: integer }
    VicidialRealtimeAgentsResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/VicidialRealtimeAgentItem' }
        total: { type: integer }
        generatedAt: { type: string, format: date-time }
    VicidialRealtimePauseCodeItem:
      type: object
      properties:
        pauseCode: { type: string }
        pauseName: { type: string }
        visibleName: { type: string }
        billable: { type: string }
    VicidialRealtimePauseCodesResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/VicidialRealtimePauseCodeItem' }
        generatedAt: { type: string, format: date-time }
    VicidialRealtimeCampaignsResponse:
      type: object
      properties:
        items:
          type: array
          items: { type: string }
        generatedAt: { type: string, format: date-time }
    VicidialLeadImportRequest:
      type: object
      required: [campaignId, listId]
      properties:
        campaignId: { type: string }
        listId: { type: string }
        fileToken: { type: string, nullable: true }
        dryRun: { type: boolean, nullable: true }
paths:
  /api/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
  /api/settings/vicidial:
    get:
      deprecated: true
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VicidialSettingsResponse' }
    put:
      deprecated: true
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VicidialSettingsRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
  /api/admin/settings:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VicidialSettingsResponse' }
    put:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VicidialSettingsRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
  /api/admin/config/vicidial:
    get:
      deprecated: true
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VicidialSettingsResponse' }
    put:
      deprecated: true
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VicidialSettingsRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
  /api/agent/profile:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentProfileResponse' }
  /api/agent/profile/agent-pass:
    put:
      security: [{ bearerAuth: [] }]
