  /api/agent/validacion-claro-peru/disposiciones:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaignId, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/validacion-claro-peru/subtipificaciones:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaignId, in: query, required: false, schema: { type: string } }
        - { name: tipificacion, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/validacion-claro-peru/formulario:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: documento, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/validacion-claro-peru/gestion:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/admin/users/{id}/agent-pass:
    put:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentPassUpdateRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
  /api/agent/active-lead:
