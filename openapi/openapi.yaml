  /api/agent/vicidial/campaigns:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VicidialCampaignsResponse' }
  /api/agent/vicidial/campaign/connect:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignConnectRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/agent/vicidial/status:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VicidialStatusResponse' }
  /api/campaigns/{campaignId}:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaignId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/vicidial/dial/next:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [campaignId]
              properties:
                campaignId: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
